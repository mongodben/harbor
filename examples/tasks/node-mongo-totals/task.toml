version = "1.0"

[task]
name = "harbor/node-mongo-totals"
description = "Node.js agent reads seeded data from a MongoDB sidecar, aggregates it, and writes a JSON result file."
keywords = ["docker-compose", "mongodb", "nodejs", "sidecar", "seed"]

[metadata]
difficulty = "easy"
category = "example"
tags = ["docker-compose", "mongodb", "nodejs"]

[agent]
timeout_sec = 300.0

[verifier]
# Shared mode (the default when no verifier `environment` is set): the verifier
# runs inside the agent's Node container and reads /app/item_totals.json off
# disk. No DB access or artifact collection is needed at verification time.
environment_mode = "shared"
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 1024
